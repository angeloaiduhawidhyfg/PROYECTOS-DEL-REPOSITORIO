<html>
<head>
<title>Semana7</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

body{
    background:#111111;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    width:700px;
    height:300px;
    position:relative;
    overflow:hidden;
    border-radius:20px;
    background:#000;
    box-shadow:0px 0px 25px rgba(0,0,0,0.8);
}

.cielo{
    width:120%;
    height:120%;
    position:absolute;
    top:-20px;
    left:-40px;
    background-image:url(img/cielo.jpg);
    background-size:cover;
    background-position:center;
    z-index:1;
    animation:moverCielo 25s linear infinite;
}

.fondo{
    width:110%;
    height:110%;
    position:absolute;
    bottom:-10px;
    left:-20px;
    background-image:url(img/fondo.png);
    background-size:cover;
    background-position:center bottom;
    z-index:2;
    animation:zoomFondo 12s ease-in-out infinite;
}

.persona1{
    width:350px;
    position:absolute;
    bottom:10px;
    left:130px;
    top: 50px;
    z-index:3;
    animation:separar1 15s linear infinite ;
}

.persona2{
    width:350px;
    position:absolute;
    bottom:10px;
    top: 50px;
    right:130px;
    z-index:3;
    animation:separar2 15s linear infinite ;
}



@keyframes moverCielo{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-70px);
    }
}

@keyframes zoomFondo{
    0%{
        transform:scale(1);
    }
    100%{
        transform:scale(1.05);
    }
}

@keyframes separar1{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(-30px);
    }
}

@keyframes separar2{
    0%{
        transform:translateX(0);
    }
    100%{
        transform:translateX(30px);
    }
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="cielo"></div>

    <div class="fondo"></div>

    <img src="img/persona1.png" class="persona1">

    <img src="img/persona2.png" class="persona2">


</div>

<a href="../index.html" class="volver">VOLVER</a>
</body>
</html>
