<html>
<head>
    <title>ANIMACION 3</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 800px;
            height: 400px;
            border: 1px solid black;
            position: relative;/* para centrar el div */
            margin: 0 auto;/* para centrar el div */
            background-color: rgb(26, 138, 212);
            overflow: hidden;/* muestra solo lo que se encuentra adentro */

        .cuadrito{ 
            width: 30px;
            height: 5px;
            background-color: white;
            position: absolute ;/* permite mover el div dentro del contenedor */
            top: 50px;
            left: 150px;

            animation: cuadrito 2s infinite ease-in;
        }

        @keyframes cuadrito{
            from{
                left: 800px;

            }
            to{
                left: -100px;

            }
        }
        .cuadrito1{ 
            width: 30px;
            height: 5px;
            background-color: white;
            position: absolute ;
